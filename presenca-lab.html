<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presença Lab · FLUXO SIMPLES</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #1f2937; font-size: 28px; font-weight: 700; margin: 0 0 12px 0; text-align: center; }
    h2 { color: #374151; font-size: 20px; font-weight: 600; margin: 0 0 16px 0; padding-bottom: 8px; border-left: 4px solid #3b82f6; padding-left: 12px; }
    button { padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; transition: all 0.2s; }
    .btn-big { width: 100%; padding: 16px; font-size: 18px; margin: 8px 0; }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .status { padding: 16px; border-radius: 12px; margin: 12px 0; font-family: 'SF Mono', monospace; font-size: 14px; text-align: center; font-weight: 500; }
    .status.ok { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #166534; border: 2px solid #86efac; }
    .status.processing { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; border: 2px solid #f59e0b; animation: pulse 1.5s infinite; }
    .status.error { background: linear-gradient(135deg, #fef2f2, #fecaca); color: #dc2626; border: 2px solid #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    textarea { width: 100%; padding: 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; line-height: 1.6; box-sizing: border-box; resize: vertical; font-family: inherit; }
    textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    textarea.readonly { background: #f9fafb; color: #6b7280; }
    .mic-container { text-align: center; margin: 24px 0; }
    .mic-btn { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #3b82f6; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .mic-btn:hover { transform: scale(1.05); }
    .mic-btn.recording { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border-color: #dc2626; animation: pulse-ring 1.2s infinite; }
    .mic-btn.processing { background: #f59e0b; border-color: #d97706; color: white; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    .mic-status { margin-top: 12px; font-size: 14px; font-weight: 500; color: #6b7280; }
    #log { background: #1f2937; color: #f9fafb; height: 200px; overflow-y: auto; border-radius: 12px; padding: 16px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎙️ Presença Lab · FLUXO SIMPLES</h1>
    <p style="text-align:center; color:#6b7280; margin:0;">Fale → Transcreve → CRS → IA responde (Groq grátis)</p>
  </div>

  <!-- CHAVE -->
  <div class="card">
    <h2>🔑 Chave Groq (grátis)</h2>
    <input type="password" id="apiKey" placeholder="console.groq.com/keys" />
    <div style="display:flex; gap:12px; margin-top:12px;">
      <button class="btn-primary" style="flex:1;" onclick="salvarChave()">💾 Salvar</button>
      <button class="btn-secondary" style="flex:1;" onclick="testarAPI()">🧪 Testar</button>
    </div>
    <div id="statusAPI"></div>
  </div>

  <!-- FLUXO 1: TUDÃO -->
  <div class="card">
    <h2>🚀 FLUXO COMPLETO (Fale → Resposta)</h2>
    <div class="mic-container">
      <div class="mic-btn" id="micBtn">🎤</div>
      <div class="mic-status" id="micStatus">Clique e fale naturally</div>
    </div>
    <div id="statusFluxoCompleto" class="status" style="display:none;"></div>
  </div>

  <!-- FLUXO 2: PASSO A PASSO -->
  <div class="card">
    <h2>📋 PASSO A PASSO</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;">
      <button class="btn-big btn-primary" onclick="fluxoPassoAPasso(1)">1️⃣ Gravar + Transcrever</button>
      <button class="btn-big btn-secondary" onclick="fluxoPassoAPasso(2)">2️⃣ CRS (Análise)</button>
      <button class="btn-big btn-primary" onclick="fluxoPassoAPasso(3)">3️⃣ IA Responder</button>
      <button class="btn-big btn-secondary" onclick="fluxoPassoAPasso(4)">🔄 Limpar</button>
    </div>
    
    <div>
      <label><strong>📝 Texto transcrito:</strong></label>
      <textarea id="textoTranscrito" class="readonly" rows="3" readonly placeholder="Fale para aparecer aqui..."></textarea>
    </div>
    
    <div>
      <label><strong>📊 Relatório CRS:</strong></label>
      <textarea id="relatorioCRS" class="readonly" rows="2" readonly placeholder="Análise emocional..."></textarea>
    </div>
    
    <div>
      <label><strong>🎯 Resposta final IA:</strong></label>
      <textarea id="respostaFinal" class="readonly" rows="5" readonly placeholder="Resposta calorosa aqui..."></textarea>
    </div>
  </div>

  <!-- LOG -->
  <div class="card">
    <h2>📋 Log</h2>
    <div id="log"></div>
  </div>

  <script>
    // GLOBALS
    let apiKey = localStorage.getItem('presenca_simple_key') || '';
    let audioBlob = null;
    let metricas = null;
    let textoTranscrito = '';
    let relatorioCRS = null;
    let isRecording = false;
    let mediaRecorder = null;
    let stream = null;

    // BOOT
    document.getElementById('apiKey').value = apiKey;
    log('🎙️ Presença Lab Simples - pronto!');

    // LOG
    function log(msg) {
      const logDiv = document.getElementById('log');
      const ts = new Date().toLocaleTimeString();
      logDiv.innerHTML += `<div>[${ts}] ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function showStatus(id, msg, type = 'ok') {
      const el = document.getElementById(id);
      el.innerHTML = msg;
      el.className = `status ${type}`;
      el.style.display = 'block';
    }

    // CHAVE
    function salvarChave() {
      apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return showStatus('statusAPI', '❌ Chave vazia', 'error');
      localStorage.setItem('presenca_simple_key', apiKey);
      showStatus('statusAPI', '✅ Chave salva! Groq pronta 🚀', 'ok');
      log('Chave salva');
    }

    async function testarAPI() {
      if (!apiKey) apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return showStatus('statusAPI', '❌ Digite a chave primeiro', 'error');
      
      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: [{role:'user', content:'teste'}], model: 'llama3-8b-8192' })
        });
        showStatus('statusAPI', res.ok ? '✅ Groq OK! Pode usar 🚀' : `❌ Erro ${res.status}`, res.ok ? 'ok' : 'error');
      } catch(e) {
        showStatus('statusAPI', `❌ ${e.message}`, 'error');
      }
    }

    // MICROFONE
    document.getElementById('micBtn').addEventListener('click', () => isRecording ? stopRecording() : startRecordingFull());

    async function startRecordingFull() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        
        mediaRecorder.onstop = async () => {
          audioBlob = new Blob(chunks, { type: 'audio/webm' });
          await fluxoCompleto(); // TUDÃO automático
        };
        
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('micBtn').textContent = '⏹️';
        document.getElementById('micStatus').textContent = 'Fale agora...';
        showStatus('statusFluxoCompleto', '🎤 Gravando...', 'processing');
        log('🔴 Gravação iniciada');
      } catch(e) {
        showStatus('statusFluxoCompleto', `❌ Microfone: ${e.message}`, 'error');
      }
    }

    function stopRecording() {
      mediaRecorder.stop();
      stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎤';
      document.getElementById('micStatus').textContent = 'Clique e fale';
    }

    // FLUXO COMPLETO
    async function fluxoCompleto() {
      try {
        showStatus('statusFluxoCompleto', '🔄 Processando áudio...', 'processing');
        
        // 1. Métricas
        metricas = await extrairMetricas(audioBlob);
        log(`📊 Métricas: silêncio ${metricas.silence_pct}% energia ${metricas.energy_pct}%`);
        
        // 2. Texto FIXO (simulado - troque por Gemini se quiser)
        textoTranscrito = "Oi, tudo bem? Queria conversar um pouco."; // SIMULAÇÃO
        document.getElementById('textoTranscrito').value = textoTranscrito;
        
        // 3. CRS
        relatorioCRS = await fetch('https://nucleo-crs-elayon.onrender.com/api/crs/analisar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(metricas)
        }).then(r => r.ok ? r.json() : null).catch(() => null);
        
        document.getElementById('relatorioCRS').value = relatorioCRS ? 
          `${relatorioCRS.analise_sugestiva} | ${relatorioCRS.sugestao_ia || ''}` : 
          'CRS offline - continua sem';
        
        // 4. Resposta IA
        const resposta = await gerarRespostaIA(textoTranscrito, relatorioCRS);
        document.getElementById('respostaFinal').value = resposta;
        
        showStatus('statusFluxoCompleto', '✅ Fluxo completo OK! 🎉', 'ok');
        log('✅ Fluxo completo executado');
        
      } catch(e) {
        showStatus('statusFluxoCompleto', `❌ Erro: ${e.message}`, 'error');
        log('❌ Erro fluxo: ' + e.message);
      }
    }

    // PASSO A PASSO
    async function fluxoPassoAPasso(passo) {
      if (passo === 1) {
        if (!audioBlob) return showStatus('statusFluxoCompleto', '❌ Grave áudio primeiro', 'error');
        metricas = await extrairMetricas(audioBlob);
        textoTranscrito = "Oi, tudo bem? Queria conversar."; // SIMULAÇÃO
        document.getElementById('textoTranscrito').value = textoTranscrito;
        log('✅ Passo 1: texto "' + textoTranscrito + '"');
        
      } else if (passo === 2) {
        if (!metricas) return log('❌ Passo 2: faça passo 1 primeiro');
        relatorioCRS = await fetch('https://nucleo-crs-elayon.onrender.com/api/crs/analisar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(metricas)
        }).then(r => r.ok ? r.json() : null).catch(() => null);
        
        document.getElementById('relatorioCRS').value = relatorioCRS ? 
          `${relatorioCRS.analise_sugestiva}` : 'CRS offline';
        log('✅ Passo 2: CRS ' + (relatorioCRS?.analise_sugestiva || 'offline'));
        
      } else if (passo === 3) {
        if (!textoTranscrito) return log('❌ Passo 3: faça passo 1 primeiro');
        const resposta = await gerarRespostaIA(textoTranscrito, relatorioCRS);
        document.getElementById('respostaFinal').value = resposta;
        log('✅ Passo 3: resposta gerada');
        
      } else if (passo === 4) {
        document.getElementById('textoTranscrito').value = '';
        document.getElementById('relatorioCRS').value = '';
        document.getElementById('respostaFinal').value = '';
        audioBlob = null; metricas = null; relatorioCRS = null;
        log('🧹 Limpo');
      }
    }

    // IA
    async function gerarRespostaIA(texto, crs) {
      try {
        const system = 'Você é uma presença acolhedora. Responda em português brasileiro, caloroso e humano. ' +
          'Seja direto e empático. Nunca mencione análise técnica.';
        
        if (crs && crs.ok) {
          system += `

[INFO INTERNA]: ${crs.analise_sugestiva}. ${crs.sugestao_ia || ''}`;
        }
        
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${apiKey || localStorage.getItem('presenca_simple_key')}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: system },
              { role: 'user', content: texto }
            ],
            model: 'llama3-8b-8192',
            max_tokens: 400
          })
        });
        
        const data = await res.json();
        return data.choices[0].message.content.trim();
      } catch(e) {
        return 'Desculpe, momentinho... posso ajudar com o que precisar! 😊';
      }
    }

    // MÉTRICAS (igual original)
    async function extrairMetricas(blob) {
      const url = URL.createObjectURL(blob);
      const arrayBuf = await fetch(url).then(r => r.arrayBuffer());
      URL.revokeObjectURL(url);
      const actx = new AudioContext();
      const dec = await actx.decodeAudioData(arrayBuf);
      const ch = dec.getChannelData(0);
      const dur = dec.duration;
      const win = Math.floor(dec.sampleRate * 0.025);
      const rms = [];
      
      for (let i = 0; i < ch.length; i += win) {
        let sum = 0;
        const end = Math.min(i + win, ch.length);
        for (let j = i; j < end; j++) sum += ch[j] * ch[j];
        rms.push(Math.sqrt(sum / (end - i)));
      }
      
      const THR = 0.015;
      let silF = 0;
      for (let k = 0; k < rms.length; k++) if (rms[k] < THR) silF++;
      
      const silP = rms.length ? (silF / rms.length) * 100 : 0;
      const rmM = rms.reduce((a, b) => a + b, 0) / rms.length;
      const eng = Math.min(100, rmM * 800);
      
      await actx.close();
      return { silence_pct: parseFloat(silP.toFixed(2)), energy_pct: parseFloat(eng.toFixed(2)), duration_sec: parseFloat(dur.toFixed(2)) };
    }
  </script>
</body>
</html>
