<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presença Lab · Teste API</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .chat-area {
      min-height: 300px; max-height: 420px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
      padding: 4px 0; margin-bottom: 14px;
    }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; word-break: break-word; }
    .msg.user    { align-self: flex-end; background: var(--primary); color: #fff; border-radius: 14px 14px 4px 14px; }
    .msg.ia      { align-self: flex-start; background: #fff; border: 1px solid var(--line); border-radius: 14px 14px 14px 4px; color: var(--text); }
    .msg.sistema { align-self: center; background: #f4fbfc; border: 1px solid var(--line); color: var(--muted); font-size: 12px; border-radius: 10px; padding: 6px 12px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-txt { flex: 1; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; font-size: 14px; resize: none; outline: none; font-family: Arial, sans-serif; max-height: 100px; }
    .input-txt:focus { border-color: var(--primary); }
    .btn-enviar { width: 44px; height: 44px; border-radius: 12px; background: var(--primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-enviar svg { width: 18px; height: 18px; fill: #fff; }
    .btn-enviar:disabled { background: var(--line); cursor: not-allowed; }
    .status-linha { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0; min-height: 22px; }
    .status-linha.ok  { color: var(--ok); font-weight: bold; }
    .status-linha.err { color: var(--err); font-weight: bold; }
    .status-linha.busy { color: var(--warn); }
    input.campo, select.campo {
      width: 100%; padding: 8px 10px; border: 1px solid var(--line);
      border-radius: 8px; font-size: 13px; background: #fff; margin-bottom: 8px;
    }
    .nota-prov { font-size: 11px; color: var(--muted); margin-bottom: 12px; display: block; }
  </style>
</head>
<body>
<main class="shell">

  <section class="card">
    <h1>Presença Lab · Teste API</h1>
    <p>Configure a chave, escolha o provedor e mande um "Olá". Se a IA responder de forma natural — está conectada.</p>
    <div class="row"><a class="btn secondary" href="index.html">← Voltar</a></div>
  </section>

  <section class="card">
    <h2>Configuração</h2>
    <span class="label">Provedor</span>
    <select class="campo" id="provedor">
      <option value="gemini">Gemini — Google (Gratuito)</option>
      <option value="groq">Groq — LLaMA (Gratuito)</option>
      <option value="mistral">Mistral AI (Gratuito)</option>
      <option value="claude">Claude — Anthropic (Pago)</option>
      <option value="openai">GPT — OpenAI (Pago)</option>
    </select>
    <span class="nota-prov" id="notaProv"></span>
    <span class="label">Chave da API</span>
    <input type="password" class="campo" id="campoChave" placeholder="Cole sua chave aqui..."/>
    <div class="row">
      <button class="btn" id="btnSalvar">Salvar e conectar</button>
      <button class="btn secondary" id="btnLimparChat">Limpar chat</button>
    </div>
    <div class="status-linha" id="statusConexao">Aguardando configuração</div>
  </section>

  <section class="card">
    <h2>Chat</h2>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-row">
      <textarea class="input-txt" id="inputTxt" rows="1" placeholder="Digite e pressione Enter..."></textarea>
      <button class="btn-enviar" id="btnEnviar" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </section>

  <section class="card">
    <h2>Log técnico</h2>
    <div class="log" id="logBox"></div>
    <div class="row" style="margin-top:10px;">
      <button class="btn secondary" id="btnLimparLog">Limpar log</button>
    </div>
  </section>

</main>
<script src="js/base.js"></script>
<script>
var PROVEDORES = {
  gemini: {
    nota: 'Gratuito · aistudio.google.com/apikey · chave começa com AIza...',
    chamar: async function(chave, hist, sys) {
      var contents = hist.map(function(m) { return { role: m.role==='assistant'?'model':'user', parts:[{text:m.content}] }; });
      var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+chave, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ system_instruction:{parts:[{text:sys}]}, contents:contents, generationConfig:{maxOutputTokens:600,temperature:0.8} })
      });
      if (!res.ok) { var e=await res.text(); throw new Error('Gemini '+res.status+': '+e.slice(0,120)); }
      var d=await res.json(); return d.candidates[0].content.parts[0].text.trim();
    }
  },
  groq: {
    nota: 'Gratuito · console.groq.com · chave começa com gsk_...',
    chamar: async function(chave, hist, sys) {
      var res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+chave},
        body: JSON.stringify({ model:'llama-3.3-70b-versatile', max_tokens:600, messages:[{role:'system',content:sys}].concat(hist) })
      });
      if (!res.ok) { var e=await res.text(); throw new Error('Groq '+res.status+': '+e.slice(0,120)); }
      var d=await res.json(); return d.choices[0].message.content.trim();
    }
  },
  mistral: {
    nota: 'Gratuito · console.mistral.ai',
    chamar: async function(chave, hist, sys) {
      var res = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+chave},
        body: JSON.stringify({ model:'mistral-small-latest', max_tokens:600, messages:[{role:'system',content:sys}].concat(hist) })
      });
      if (!res.ok) { var e=await res.text(); throw new Error('Mistral '+res.status+': '+e.slice(0,120)); }
      var d=await res.json(); return d.choices[0].message.content.trim();
    }
  },
  claude: {
    nota: 'Pago · console.anthropic.com · chave começa com sk-ant-...',
    chamar: async function(chave, hist, sys) {
      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json','x-api-key':chave,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:600, system:sys, messages:hist })
      });
      if (!res.ok) { var e=await res.text(); throw new Error('Claude '+res.status+': '+e.slice(0,120)); }
      var d=await res.json(); return d.content[0].text.trim();
    }
  },
  openai: {
    nota: 'Pago · platform.openai.com/api-keys · chave começa com sk-...',
    chamar: async function(chave, hist, sys) {
      var res = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+chave},
        body: JSON.stringify({ model:'gpt-4o-mini', max_tokens:600, messages:[{role:'system',content:sys}].concat(hist) })
      });
      if (!res.ok) { var e=await res.text(); throw new Error('OpenAI '+res.status+': '+e.slice(0,120)); }
      var d=await res.json(); return d.choices[0].message.content.trim();
    }
  }
};

var chaveAtiva='', provedorAtivo='gemini', historico=[];
var SYSTEM='Você é uma presença acolhedora. Responda em português brasileiro de forma natural, direta e calorosa.';

(function boot(){
  chaveAtiva = localStorage.getItem('lab_gemini_key') || '';
  var cfg = localStorage.getItem('elayon_ia_config');
  if (cfg) { try { var p=JSON.parse(cfg); chaveAtiva=chaveAtiva||p.chave||''; provedorAtivo=p.provedor||'gemini'; } catch(e){} }
  if (chaveAtiva) { document.getElementById('campoChave').value=chaveAtiva; document.getElementById('btnEnviar').disabled=false; setStatus('Chave carregada do storage. Pronto.','ok'); log('Chave carregada automaticamente','ok'); }
  document.getElementById('provedor').value = provedorAtivo;
  atualizarNota();
  msg('sistema','Configure a chave e mande um "Olá" para testar a conexão.');
})();

function log(m,t){ ELAYON_LAB.appendLog(m,t||'ok'); }
function setStatus(m,t){ var el=document.getElementById('statusConexao'); el.textContent=m; el.className='status-linha'+(t?' '+t:''); }
function atualizarNota(){ var p=document.getElementById('provedor').value; document.getElementById('notaProv').textContent=PROVEDORES[p]?PROVEDORES[p].nota:''; }

function msg(role, texto){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div'); div.className='msg '+role; div.textContent=texto;
  area.appendChild(div); area.scrollTop=area.scrollHeight;
}

document.getElementById('provedor').addEventListener('change', atualizarNota);

document.getElementById('btnSalvar').addEventListener('click', function(){
  var chave=document.getElementById('campoChave').value.trim();
  var prov=document.getElementById('provedor').value;
  if (!chave){ setStatus('Chave vazia.','err'); return; }
  chaveAtiva=chave; provedorAtivo=prov;
  localStorage.setItem('lab_gemini_key', chave);
  localStorage.setItem('elayon_ia_config', JSON.stringify({chave:chave,provedor:prov,enabled:true,endpoint:''}));
  document.getElementById('btnEnviar').disabled=false;
  setStatus('Chave salva · '+prov+' · Mande um "Olá"','ok');
  log('Chave salva · provedor: '+prov,'ok');
});

document.getElementById('btnLimparChat').addEventListener('click', function(){
  historico=[]; document.getElementById('chatArea').innerHTML='';
  msg('sistema','Chat limpo.'); log('Chat limpo','ok');
});
document.getElementById('btnLimparLog').addEventListener('click', function(){ ELAYON_LAB.clearLog(); });

document.getElementById('inputTxt').addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); enviar(); } });
document.getElementById('inputTxt').addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
document.getElementById('btnEnviar').addEventListener('click', enviar);

async function enviar(){
  var input=document.getElementById('inputTxt');
  var texto=input.value.trim();
  if(!texto||!chaveAtiva) return;
  input.value=''; input.style.height='auto';
  document.getElementById('btnEnviar').disabled=true;
  msg('user',texto);
  historico.push({role:'user',content:texto});

  var typing=document.createElement('div'); typing.className='msg ia'; typing.id='typing'; typing.textContent='...';
  document.getElementById('chatArea').appendChild(typing); document.getElementById('chatArea').scrollTop=99999;
  setStatus('Aguardando resposta...','busy');
  log('Enviando para '+provedorAtivo+'...','ok');

  try {
    var prov=PROVEDORES[provedorAtivo];
    if(!prov) throw new Error('Provedor desconhecido: '+provedorAtivo);
    var resposta=await prov.chamar(chaveAtiva, historico, SYSTEM);
    document.getElementById('typing').remove();
    msg('ia',resposta);
    historico.push({role:'assistant',content:resposta});
    if(historico.length>20) historico=historico.slice(-20);
    setStatus(provedorAtivo+' respondeu ✓','ok');
    log('Resposta: "'+resposta.slice(0,60)+(resposta.length>60?'...':'')+'"','ok');
  } catch(e) {
    document.getElementById('typing').remove();
    msg('sistema','Erro: '+e.message);
    setStatus('Erro: '+e.message.slice(0,80),'err');
    log('ERRO: '+e.message,'err');
  }

  document.getElementById('btnEnviar').disabled=false;
  input.focus();
}
</script>
</body>
</html>
