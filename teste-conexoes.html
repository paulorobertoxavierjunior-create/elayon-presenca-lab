<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Conexões</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">

    <section class="card">
      <h1>Teste 0 — Painel de conexões</h1>
      <p>Checklist completo do estado do sistema.</p>

      <div class="row">
        <button class="btn" id="btnCheck">Executar checklist</button>
        <button class="btn secondary" id="btnReset">Resetar</button>
        <button class="btn secondary" id="btnClear">Limpar log</button>
        <a class="btn secondary" href="index.html">Voltar</a>
      </div>
    </section>

    <section class="card">
      <div class="grid">

        <div class="field"><span class="label">Front</span><div class="value" id="chkFront">—</div></div>
        <div class="field"><span class="label">JS Base</span><div class="value" id="chkJS">—</div></div>
        <div class="field"><span class="label">Config</span><div class="value" id="chkConfig">—</div></div>
        <div class="field"><span class="label">Render</span><div class="value" id="chkRender">—</div></div>
        <div class="field"><span class="label">CRS</span><div class="value" id="chkCRS">—</div></div>
        <div class="field"><span class="label">Microfone</span><div class="value" id="chkMic">—</div></div>
        <div class="field"><span class="label">TTS</span><div class="value" id="chkTTS">—</div></div>

      </div>
    </section>

    <section class="card">
      <h2>Log técnico</h2>
      <div class="log" id="logBox"></div>
    </section>

  </main>

  <script src="js/base.js"></script>
  <script src="js/teste-conexoes.js"></script>
</body>
</html>
