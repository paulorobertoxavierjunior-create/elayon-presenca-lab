<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste 9.3 • Multimodal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">

    <section class="card">
      <h1>Teste 9.3 — Multimodal (imagem + texto → decisão)</h1>
      <p>
        Objetivo: validar leitura combinada e geração de decisão contextual.
      </p>

      <div class="row">
        <button class="btn" id="btnProcessar">Processar multimodal</button>
        <button class="btn secondary" id="btnResetar">Resetar</button>
        <button class="btn secondary" id="btnLimparLog">Limpar log</button>
        <a class="btn secondary" href="index.html">Voltar</a>
      </div>
    </section>

    <section class="card">
      <div class="grid">

        <div class="field">
          <span class="label">Imagem</span>
          <input id="inputImagem" type="file" accept="image/*">
        </div>

        <div class="field">
          <span class="label">Contexto</span>
          <input id="inputContexto" type="text" placeholder="Ex: sala de estar">
        </div>

        <div class="field">
          <span class="label">Mensagem adicional</span>
          <input id="inputTexto" type="text" placeholder="Ex: quero ligar isso">
        </div>

      </div>
    </section>

    <section class="card">
      <div class="grid">

        <div class="field">
          <span class="label">Status geral</span>
          <div class="value" id="statusGeral">aguardando</div>
        </div>

        <div class="field">
          <span class="label">Canal</span>
          <div class="value" id="canalAtual">—</div>
        </div>

        <div class="field">
          <span class="label">Payload</span>
          <div class="value" id="payloadAtual">—</div>
        </div>

        <div class="field">
          <span class="label">Resposta</span>
          <div class="value" id="respostaAtual">—</div>
        </div>

      </div>
    </section>

    <section class="card">
      <h2>Preview</h2>
      <img id="previewImagem" style="width:100%;border-radius:12px;">
    </section>

    <section class="card">
      <h2>Decisão gerada</h2>

      <div class="field">
        <span class="label">Resumo</span>
        <div class="value" id="outResumo">—</div>
      </div>

      <div class="field">
        <span class="label">Interpretação</span>
        <div class="value" id="outInterpretacao">—</div>
      </div>

      <div class="field">
        <span class="label">Ação sugerida</span>
        <div class="value" id="outAcao">—</div>
      </div>
    </section>

    <section class="card">
      <h2>Log técnico</h2>
      <div class="log" id="logBox"></div>
    </section>

  </main>

  <script src="js/base.js"></script>
  <script src="js/teste-multimodal.js"></script>
</body>
</html>
