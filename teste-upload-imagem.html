<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste 9 — Upload de imagem</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="page-shell">

  <section class="panel-box">
    <h2>Teste 9 — Upload de imagem + contexto + log</h2>
    <p>Valida entrada visual do mundo real com rastreabilidade completa.</p>

    <label>Selecionar imagem</label>
    <input type="file" id="inputImagem" accept="image/*" capture="environment">

    <label>Contexto</label>
    <input type="text" id="inputContexto" placeholder="Ex: estou em reunião">

    <div class="cta-row">
      <button class="btn-primary" id="btnProcessar">Processar</button>
      <button class="btn-secondary" id="btnResetar">Resetar</button>
      <button class="btn-secondary" id="btnLimparLog">Limpar log</button>
      <a class="btn-secondary" href="index.html">Voltar</a>
    </div>
  </section>

  <section class="panel-box">
    <h3>Preview</h3>
    <img id="previewImagem" style="max-width:100%; border-radius:12px;">
  </section>

  <section class="panel-box">
    <h3>Payload enviado</h3>
    <pre id="payloadBox">—</pre>
  </section>

  <section class="panel-box">
    <h3>Status geral</h3>
    <p id="status">aguardando</p>
  </section>

  <section class="panel-box">
    <h3>Log técnico</h3>
    <pre id="log"></pre>
  </section>

</main>

<script src="js/base.js"></script>
<script src="js/teste-upload-imagem.js"></script>

</body>
</html>
