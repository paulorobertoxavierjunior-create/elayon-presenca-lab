<main>
  <section class="card">
    <h2>Teste 9 — Upload de imagem + contexto + log</h2>
    <p>Valida entrada visual do mundo real com rastreabilidade completa.</p>

    <div class="row">
      <input type="file" id="inputImagem" accept="image/*" />
      <input type="text" id="inputContexto" placeholder="Ex: estou em reunião" />
    </div>

    <div class="row">
      <button class="btn" id="btnProcessar">Processar</button>
      <button class="btn-outline" id="btnResetar">Resetar</button>
    </div>

    <div class="row">
      <button class="btn-outline" id="btnLimparLog">Limpar log</button>
      <button class="btn-outline" onclick="window.location.href='index.html'">Voltar</button>
    </div>
  </section>

  <section class="card">
    <h3>Preview</h3>
    <img id="previewImagem" class="preview-img" />
  </section>

  <section class="card">
    <h3>Payload</h3>
    <pre id="payloadBox">—</pre>
  </section>

  <section class="card">
    <h3>Status</h3>
    <div id="status">aguardando</div>
  </section>

  <section class="card">
    <h3>Log técnico</h3>
    <pre id="log"></pre>
  </section>
</main>

<script src="js/teste-upload-imagem.js"></script>
